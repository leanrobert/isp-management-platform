services:
  mysql:
    image: mysql:8.0
    container_name: isp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: isp_management
      MYSQL_USER: isp_user
      MYSQL_PASSWORD: isp_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isp-network

  backend:
    build: ./backend
    container_name: isp-backend
    environment:
      DB_HOST: mysql
      DB_USER: isp_user
      DB_PASSWORD: isp_password
      DB_NAME: isp_management
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - isp-network
    command: >
      sh -c "npm run migrate && npm start"

  frontend:
    build: ./frontend
    container_name: isp-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - isp-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: isp-node-exporter
    ports:
      - "9100:9100"
    networks:
      - isp-network

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: isp-mysql-exporter
    volumes:
      - ./monitoring/mysql-exporter/.my.cnf:/etc/.my.cnf:ro
    command:
      - "--config.my-cnf=/etc/.my.cnf"
      - "--no-collect.slave_status"
    ports:
      - "9104:9104"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - isp-network

  prometheus:
    image: prom/prometheus:latest
    container_name: isp-prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - isp-network

  grafana:
    image: grafana/grafana:latest
    container_name: isp-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - isp-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: isp-alertmanager
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - isp-network

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  isp-network:
    driver: bridge
